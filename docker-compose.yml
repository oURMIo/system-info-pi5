services:
  oled-status:
    build: .
    container_name: oled-status
    privileged: true
    restart: unless-stopped
    volumes:
      - /dev/i2c-1:/dev/i2c-1
      - /dev/gpiomem:/dev/gpiomem
      - /sys:/sys:ro
      - /proc/device-tree:/proc/device-tree:ro
    environment:
      - BLINKA_FORCEBOARD=RASPBERRY_PI_5
      - BLINKA_FORCECHIP=BCM2XXX
